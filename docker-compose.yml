version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       lifehub_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    # rails serverが確実に実行されるようにbashコマンドを修正
    command: >
      bash -c "
        rm -f tmp/pids/server.pid &&
        bundle exec rails db:prepare &&
        bundle exec rails server -b 0.0.0.0 -p 3001
      "
    environment:
      RAILS_ENV:              development
      DB_HOST:                db
      DB_PORT:                5432
      DB_USERNAME:            postgres
      DB_PASSWORD:            password
      FRONTEND_ORIGIN:        http://localhost:3000
      DEVISE_JWT_SECRET_KEY:  super_secret_jwt_key_change_in_production
      RAILS_MASTER_KEY:       ${RAILS_MASTER_KEY:-}
    volumes:
      - ./backend:/app
      - bundle_cache:/usr/local/bundle
      - rails_storage:/app/storage
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      # ブラウザからのアクセス用
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # SSR(Server Side)での通信が必要な場合は内部名 http://backend:3001 を使用
      NEXTAUTH_URL:        http://localhost:3000
      NEXTAUTH_SECRET:     change_me_in_production
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  bundle_cache:
  rails_storage: